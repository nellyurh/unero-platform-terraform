name: terraform-apply

# Apply runs only on push to main (post-merge). Each environment is a GitHub Environment;
# production/staging require reviewers (configure in repo Settings -> Environments), which
# gates BOTH the workflow and the OIDC assume (apply role trusts environment:<env>).
on:
  push:
    branches: [main]
    paths: ["**.tf", ".github/workflows/terraform-apply.yml"]
  workflow_dispatch: {}

permissions:
  contents: read
  id-token: write

concurrency:
  group: terraform-apply-${{ github.ref }}
  cancel-in-progress: false

jobs:
  apply:
    runs-on: ubuntu-latest
    strategy:
      max-parallel: 1
      matrix:
        include:
          - env: dev
            account_secret: DEV_ACCOUNT_ID
          - env: staging
            account_secret: STAGING_ACCOUNT_ID
          - env: production
            account_secret: PRODUCTION_ACCOUNT_ID
    environment: ${{ matrix.env }}   # approvals enforced here for staging/production
    steps:
      - uses: actions/checkout@v4
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets[matrix.account_secret] }}:role/unero-${{ matrix.env }}-terraform
          aws-region: af-south-1
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.7.5
      - name: init
        working-directory: environments/${{ matrix.env }}
        run: terraform init
      - name: apply
        working-directory: environments/${{ matrix.env }}
        run: terraform apply -auto-approve -no-color
