name: terraform-apply

# Single-account model: one AWS account, one AWS_ACCOUNT_ID secret. Environment separation
# is enforced by per-env state keys, per-env resources, and — for staging/production — the
# per-env apply role whose OIDC trust requires the job to run inside that protected GitHub
# Environment (approval gate == IAM gate).
on:
  push:
    branches: [main]
    paths: ["**.tf", ".github/workflows/terraform-apply.yml"]
  workflow_dispatch: {}

permissions:
  contents: read
  id-token: write

concurrency:
  group: terraform-apply-${{ github.ref }}
  cancel-in-progress: false

jobs:
  apply:
    runs-on: ubuntu-latest
    strategy:
      max-parallel: 1
      matrix:
        env: [dev, staging, production]
    environment: ${{ matrix.env }}   # reviewers required on staging/production
    steps:
      - uses: actions/checkout@v4
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/unero-${{ matrix.env }}-terraform
          aws-region: af-south-1
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.7.5
      - name: init
        working-directory: environments/${{ matrix.env }}
        run: terraform init
      - name: apply
        working-directory: environments/${{ matrix.env }}
        run: terraform apply -auto-approve -no-color
