name: terraform-ci

on:
  pull_request:
    paths: ["**.tf", "**.json", ".github/workflows/terraform-ci.yml"]

permissions:
  contents: read
  id-token: write   # OIDC to AWS for plan (no long-lived keys — ADR-017)
  pull-requests: write

jobs:
  validate:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        env: [dev, staging, production, load-test]
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.7.5
      - name: fmt
        run: terraform fmt -check -recursive
      - name: init (backend disabled for validate)
        working-directory: environments/${{ matrix.env }}
        run: terraform init -backend=false
      - name: validate
        working-directory: environments/${{ matrix.env }}
        run: terraform validate

  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: checkov
        uses: bridgecrewio/checkov-action@v12
        with:
          config_file: policies/checkov.yaml
      - name: tfsec
        uses: aquasecurity/tfsec-action@v1.0.3
        with:
          additional_args: --config-file policies/tfsec.yaml

  plan:
    needs: [validate, scan]
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    strategy:
      matrix:
        env: [dev]   # lowest env plans on PR; staging/prod plan on their own gated workflow
    steps:
      - uses: actions/checkout@v4
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/unero-terraform-plan
          aws-region: af-south-1
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.7.5
      - name: init
        working-directory: environments/${{ matrix.env }}
        run: terraform init -input=false
      - name: plan
        working-directory: environments/${{ matrix.env }}
        env:
          # plan evaluates every required variable; value comes from a repo secret and is
          # only compared, never provisioned, in this read-only lane
          TF_VAR_redis_auth_token: ${{ secrets.DEV_REDIS_AUTH_TOKEN }}
        run: terraform plan -input=false -no-color
